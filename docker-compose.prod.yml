# Production deployment: backend + frontend behind Caddy (auto-HTTPS).
#
# Caddy serves ONE public domain and routes same-origin:
#   /auth /jobs /upload /feedback /stats /settings  -> backend (FastAPI)
#   everything else                                 -> frontend (Next.js)
# Same-origin is required so the cookie login (admin/admin) works over HTTPS.
#
# All settings come from .env in this directory (Azure keys, DOMAIN, ACME_EMAIL).
# Start:  docker compose -f docker-compose.prod.yml up -d --build

# Containers need an explicit public DNS resolver: with snap-Docker + systemd-resolved
# the default 127.0.0.53 stub is unreachable inside containers, which breaks Caddy's
# ACME (Let's Encrypt) and the backend's Azure calls.
x-dns: &dns ["8.8.8.8", "1.1.1.1"]

services:
  backend:
    dns: *dns
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file:
      - .env
    environment:
      # Same-origin via Caddy → the public domain is the only allowed origin.
      - CORS_ORIGINS=https://${DOMAIN}
    volumes:
      - ./config:/app/config:ro
      - ./prompts:/app/prompts:ro
      - ./data:/app/data            # persists jobs.db + uploads + exports
    expose:
      - "8000"                      # internal only; reached through Caddy
    restart: unless-stopped

  frontend:
    dns: *dns
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Baked into the client bundle at build time → must be the PUBLIC origin.
        NEXT_PUBLIC_API_URL: "https://${DOMAIN}"
    expose:
      - "3000"
    depends_on:
      - backend
    restart: unless-stopped

  caddy:
    dns: *dns
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN}
      - ACME_EMAIL=${ACME_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
